<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OTP Verification - Secure Student E-Voting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar" data-navbar></nav>
    <main class="app-shell">
        <section class="auth-panel mx-auto max-w-md">
            <div class="text-center">
                <div class="mx-auto grid h-16 w-16 place-items-center rounded-3xl bg-emerald-50 text-3xl">✉️</div>
                <h1 class="mt-5 text-3xl font-black">Verify OTP</h1>
                <p class="mt-2">Enter the six-digit OTP sent to your email.</p>
            </div>
            <form id="otp-form">
                <label for="otp_code">OTP Code</label>
                <input id="otp_code" name="otp_code" inputmode="numeric" maxlength="6" placeholder="000000" required>

                <div class="button-row">
                    <button class="flex-1" type="submit">Verify</button>
                    <button type="button" class="secondary" onclick="logout()">Cancel</button>
                </div>
            </form>
            <div id="otp-message" class="message"></div>
        </section>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/otp.js"></script>
</body>
</html>
